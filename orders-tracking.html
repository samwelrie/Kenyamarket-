<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Tracking - KenyaMarket</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <button onclick="history.back()" class="text-2xl">←</button>
      <div class="font-bold text-xl">Track Order</div>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto px-4 py-8">
    <div class="bg-white rounded-3xl p-8">
      <div class="flex justify-between mb-8">
        <div>
          <p class="text-sm text-gray-500">Order #KM254789</p>
          <p class="font-semibold">iPhone 13 Pro Max</p>
        </div>
        <div class="text-right">
          <p class="font-bold text-green-600">Shipped</p>
          <p class="text-sm text-gray-500">Estimated Delivery: 3 days</p>
        </div>
      </div>

      <!-- Progress Bar -->
      <div class="relative h-2 bg-gray-200 rounded-full mb-10">
        <div class="absolute top-0 left-0 h-2 bg-green-500 rounded-full w-3/4"></div>
      </div>

      <div class="space-y-8">
        <div class="flex gap-4">
          <div class="w-6 h-6 rounded-full bg-green-500 flex items-center justify-center text-white text-xs">✓</div>
          <div>
            <p class="font-medium">Order Placed</p>
            <p class="text-sm text-gray-500">2 days ago</p>
          </div>
        </div>
        <div class="flex gap-4">
          <div class="w-6 h-6 rounded-full bg-green-500 flex items-center justify-center text-white text-xs">✓</div>
          <div>
            <p class="font-medium">Payment Confirmed</p>
            <p class="text-sm text-gray-500">2 days ago</p>
          </div>
        </div>
        <div class="flex gap-4">
          <div class="w-6 h-6 rounded-full bg-green-500 flex items-center justify-center text-white text-xs">✓</div>
          <div>
            <p class="font-medium">Order Shipped</p>
            <p class="text-sm text-gray-500">Yesterday</p>
          </div>
        </div>
        <div class="flex gap-4 opacity-50">
          <div class="w-6 h-6 rounded-full bg-gray-300 flex items-center justify-center text-white text-xs">✓</div>
          <div>
            <p class="font-medium">Out for Delivery</p>
            <p class="text-sm text-gray-500">Expected today</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
  </html>
