<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Kenya Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Kenya Market</div>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <div class="nav-links" id="navMenu">
            <a href="index.html">Home</a>
            <a href="products.html" class="active">Products</a>
            <a href="seller-dashboard.html">Sell</a>
        </div>
    </nav>

    <div style="padding:20px; max-width:1100px; margin:0 auto;">
        <input type="text" id="searchInput" placeholder="Search products..." style="width:100%; padding:15px; font-size:17px; border-radius:50px; border:1px solid #ddd; margin-bottom:25px;">

        <h2>All Products</h2>
        <div id="productsGrid" class="products-grid"></div>
    </div>

    <script>
        const products = [
            { name: "Versace Eros Perfume", price: "KSh 4,200", oldPrice: "KSh 6,500", image: "https://picsum.photos/id/201/300/300" },
            { name: "Nike Air Force 1", price: "KSh 5,999", oldPrice: "KSh 8,900", image: "https://picsum.photos/id/60/300/300" },
            { name: "Samsung Galaxy A15", price: "KSh 17,500", oldPrice: "KSh 22,000", image: "https://picsum.photos/id/29/300/300" },
            { name: "Sony Wireless Headphones", price: "KSh 3,800", oldPrice: "KSh 5,500", image: "https://picsum.photos/id/180/300/300" }
        ];

        function renderProducts() {
            const grid = document.getElementById("productsGrid");
            grid.innerHTML = "";

            products.forEach(product => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML = 
                    '<img src="' + product.image + '" alt="' + product.name + '">' +
                    '<h3>' + product.name + '</h3>' +
                    '<p class="price">' + product.price + '</p>' +
                    '<p style="text-decoration:line-through; color:#999;">' + product.oldPrice + '</p>';
                grid.appendChild(card);
            });
        }

        window.onload = renderProducts;
    </script>
</body>
</html>
