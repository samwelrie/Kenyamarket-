<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Kenya Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Kenya Market</div>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <div class="nav-links" id="navMenu">
            <a href="index.html">Home</a>
            <a href="products.html" class="active">Products</a>
            <a href="seller-dashboard.html">Sell</a>
        </div>
    </nav>

    <div style="padding:20px; max-width:1100px; margin:0 auto;">
        <input type="text" id="searchInput" placeholder="Search products..." 
               style="width:100%; padding:15px; font-size:17px; border:1px solid #ddd; border-radius:50px; margin-bottom:25px;">

        <h2>All Products</h2>
        
        <div id="productsGrid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:20px; margin-top:20px;"></div>
    </div>

    <script>
        const products = [
            { name: "Versace Eros Perfume", price: 4200, oldPrice: 6500, image: "https://picsum.photos/id/201/300/300" },
            { name: "Nike Air Force 1", price: 5999, oldPrice: 8900, image: "https://picsum.photos/id/60/300/300" },
            { name: "Samsung Galaxy A15", price: 17500, oldPrice: 22000, image: "https://picsum.photos/id/29/300/300" },
            { name: "Sony Wireless Headphones", price: 3800, oldPrice: 5500, image: "https://picsum.photos/id/180/300/300" },
            { name: "Leather Jacket", price: 4500, oldPrice: 7200, image: "https://picsum.photos/id/201/300/300" },
            { name: "Diamond Ring", price: 30000, oldPrice: 45000, image: "https://picsum.photos/id/237/300/300" }
        ];

        function renderProducts() {
            const container = document.getElementById("productsGrid");
            container.innerHTML = "";

            products.forEach(product => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML = `
                    <img src="\( {product.image}" alt=" \){product.name}" style="width:100%; height:200px; object-fit:cover; border-radius:12px;">
                    <h3>${product.name}</h3>
                    <p style="color:#27ae60; font-weight:bold; font-size:18px;">KSh ${product.price.toLocaleString()}</p>
                    ${product.oldPrice ? `<p style="text-decoration: line-through; color:#999; font-size:14px;">KSh ${product.oldPrice.toLocaleString()}</p>` : ''}
                `;
                container.appendChild(card);
            });
        }

        window.onload = renderProducts;
    </script>
</body>
          </html>
