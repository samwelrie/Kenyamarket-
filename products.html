<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Kenya Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Kenya Market</div>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <div class="nav-links" id="navMenu">
            <a href="index.html">Home</a>
            <a href="products.html" class="active">Products</a>
            <a href="seller-dashboard.html">Sell</a>
        </div>
    </nav>

    <div style="padding:20px; max-width:1100px; margin:0 auto;">
        <input type="text" id="searchInput" placeholder="Search products..." 
               style="width:100%; padding:15px; font-size:17px; border:1px solid #ddd; border-radius:50px; margin-bottom:25px;">

        <h2>All Products</h2>
        <div id="productsGrid" class="products-grid"></div>
    </div>

    <script>
        function renderProducts() {
            const products = JSON.parse(localStorage.getItem("marketProducts")) || [];
            const container = document.getElementById("productsGrid");
            container.innerHTML = "";

            if (products.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#777; padding:60px;">No products available yet.<br>Sellers haven't posted anything.</p>`;
                return;
            }

            products.forEach(product => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML = `
                    <h3>${product.name}</h3>
                    <p class="price">KSh ${product.price.toLocaleString()}</p>
                    <p style="font-size:14px; color:#666;">${product.description}</p>
                    <button onclick="buyNow('${product.name}', ${product.price})" 
                            style="background:#27ae60; color:white; border:none; padding:12px; width:100%; border-radius:10px; margin-top:10px;">
                        Buy Now
                    </button>
                `;
                container.appendChild(card);
            });
        }

        function buyNow(name, price) {
            if (confirm(`Buy ${name} for KSh ${price.toLocaleString()}?\n\n(This is a demo)`)) {
                alert("✅ Order placed successfully!\n\nThank you for shopping at Kenya Market.");
            }
        }

        window.onload = renderProducts;
    </script>
</body>
</html>
