<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Kenya Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="marquee">
        <p>Free delivery on orders above KSh 2,000 • 50+ new products today • 24-hour customer support • Safe payment coming soon •</p>
    </div>

    <nav>
        <div class="logo">Kenya Market</div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <div class="nav-links" id="navMenu">
            <a href="index.html">Home</a>
            <a href="products.html" class="active">Products</a>
            <a href="#" onclick="showLogin()">Login</a>
        </div>
    </nav>

    <div style="padding: 20px; max-width: 1100px; margin: 0 auto;">
        <h1 style="text-align:center; margin-bottom:30px;">Our Products</h1>
        
        <div id="productsGrid" class="products-grid"></div>
    </div>

    <script src="app.js"></script>
    <script>
        const products = [
            { name: "Versace Eros Perfume", price: "KSh 4,200", img: "https://picsum.photos/id/1015/400/300" },
            { name: "Nike Air Force 1", price: "KSh 5,999", img: "https://picsum.photos/id/201/400/300" },
            { name: "Samsung Galaxy A15", price: "KSh 17,500", img: "https://picsum.photos/id/160/400/300" },
            { name: "Sony Wireless Headphones", price: "KSh 3,800", img: "https://picsum.photos/id/367/400/300" }
        ];

        const grid = document.getElementById("productsGrid");

        products.forEach(product => {
            const card = document.createElement("div");
            card.className = "product-card";
            card.innerHTML = `
                <img src="\( {product.img}" alt=" \){product.name}">
                <h3>${product.name}</h3>
                <p class="price">${product.price}</p>
            `;
            card.onclick = () => showLogin();
            grid.appendChild(card);
        });
    </script>
</body>
</html>
