<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - KenyaMarket</title>
    <link rel="stylesheet" href="css/styles.css"> <!-- Update path if needed -->
    <style>
        /* Quick styles for products page */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .product-card {
            border: 1px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
            background: white;
            transition: all 0.3s;
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .product-info {
            padding: 15px;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .wishlist-btn.active { color: red; }
    </style>
</head>
<body>

    <!-- ================== NAVBAR ================== -->
    <nav class="main-navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">🇰🇪 KenyaMarket</a>
            </div>

            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="products.html">Browse Products</a>
                <a href="seller-dashboard.html" data-nav="seller-dashboard.html">Start Selling</a>
            </div>

            <div class="nav-search">
                <input type="text" id="product-search" class="search-input" placeholder="Search products...">
            </div>

            <div class="nav-actions">
                <button id="notifications-btn">🛎️</button>
                
                <div class="logged-in" style="display: none; gap: 10px; align-items: center;">
                    <a href="customer-dashboard.html">👤</a>
                    <a href="seller-dashboard.html">🛒</a>
                    <button class="logout-btn">Logout</button>
                </div>

                <div class="logged-out">
                    <a href="login.html">Login</a>
                </div>
            </div>

            <button id="hamburger" class="hamburger">☰</button>
        </div>

        <!-- Mobile Menu -->
        <div id="navMenu" class="mobile-nav">
            <a href="index.html">Home</a>
            <a href="products.html">Browse Products</a>
            <a href="seller-dashboard.html">Start Selling</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <div class="container">
        <h1>Browse Products</h1>

        <!-- Category Filters -->
        <div class="category-filters">
            <button class="category-filter active" data-category="all">All</button>
            <button class="category-filter" data-category="electronics">Electronics</button>
            <button class="category-filter" data-category="farm">Farm Produce</button>
            <button class="category-filter" data-category="fashion">Fashion</button>
        </div>

        <!-- Products Grid -->
        <div id="products-container" class="products-grid">
            <!-- Populated by JavaScript -->
        </div>

        <button id="load-more" style="display:block; margin:30px auto;">Load More</button>
    </div>

    <!-- ================== SCRIPTS ================== -->
    <script src="js/app.js"></script>
    <script src="js/products.js"></script>   <!-- Change to product.js if you rename it -->

</body>
                </html>
