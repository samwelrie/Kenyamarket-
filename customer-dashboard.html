<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Kenya Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Kenya Market</div>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <div class="nav-links" id="navMenu">
            <a href="index.html">Home</a>
            <a href="products.html">Shop</a>
            <a href="customer-dashboard.html" class="active">My Account</a>
        </div>
    </nav>

    <div style="padding:25px; max-width:1100px; margin:0 auto;">
        <h1>Welcome back, Customer!</h1>
        <p style="color:#27ae60; font-size:18px;">What would you like to do today?</p>

        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:20px; margin-top:30px;">
            <div onclick="goToProducts()" style="background:white; padding:30px; border-radius:16px; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.1); cursor:pointer;">
                <h2>🛍️ Browse Products</h2>
                <p>Shop from all available items</p>
            </div>
            
            <div style="background:white; padding:30px; border-radius:16px; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.1); cursor:pointer;">
                <h2>❤️ My Favorites</h2>
                <p>Your saved items</p>
            </div>
            
            <div style="background:white; padding:30px; border-radius:16px; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.1); cursor:pointer;">
                <h2>📦 My Orders</h2>
                <p>Track your purchases</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function goToProducts() {
            window.location.href = "products.html";
        }
    </script>
</body>
  </html>
