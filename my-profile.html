<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - KenyaMarket</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50">

  <!-- Top Nav -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <button onclick="history.back()" class="text-2xl">←</button>
      <div class="font-bold text-xl">My Profile</div>
      <button onclick="goToEditProfile()" class="text-blue-600 font-medium">Edit</button>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto px-4 py-8">
    <div class="text-center mb-10">
      <img src="https://i.pravatar.cc/120?u=brian" class="w-32 h-32 rounded-3xl mx-auto border-4 border-white shadow">
      <h1 class="text-3xl font-bold mt-4">Brian Omondi</h1>
      <p class="text-gray-600">+254 712 345 678</p>
      <p class="text-gray-500 text-sm">Nairobi, Kenya</p>
    </div>

    <div class="space-y-6">
      <div class="bg-white rounded-3xl p-6">
        <h3 class="font-semibold mb-4">Personal Information</h3>
        <div class="space-y-4">
          <div class="flex justify-between"><span class="text-gray-600">Email</span><span>brian.omondi@email.com</span></div>
          <div class="flex justify-between"><span class="text-gray-600">Member Since</span><span>January 2025</span></div>
          <div class="flex justify-between"><span class="text-gray-600">Total Orders</span><span class="font-semibold">12</span></div>
        </div>
      </div>

      <div onclick="goToEditProfile()" class="bg-white rounded-3xl p-6 flex items-center justify-between cursor-pointer">
        <div class="flex items-center gap-4">
          <i class="fas fa-user-edit text-2xl text-blue-600"></i>
          <div>
            <h3 class="font-semibold">Edit Profile</h3>
            <p class="text-sm text-gray-500">Update your information</p>
          </div>
        </div>
        <i class="fas fa-chevron-right"></i>
      </div>

      <div onclick="KenyaMarket.logout()" class="bg-red-50 text-red-600 rounded-3xl p-6 text-center font-medium cursor-pointer">
        Logout
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    function goToEditProfile() {
      window.location.href = 'edit-profile.html';
    }
  </script>
</body>
  </html>
