<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - KenyaMarket</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <button onclick="history.back()" class="text-2xl">←</button>
      <div class="font-bold text-xl">My Orders</div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-6">
    <div class="flex gap-4 border-b mb-6">
      <button onclick="switchTab(0)" class="tab-btn active pb-3 px-4 font-medium border-b-2 border-blue-600">All Orders</button>
      <button onclick="switchTab(1)" class="tab-btn pb-3 px-4 font-medium text-gray-500">Pending</button>
      <button onclick="switchTab(2)" class="tab-btn pb-3 px-4 font-medium text-gray-500">Shipped</button>
      <button onclick="switchTab(3)" class="tab-btn pb-3 px-4 font-medium text-gray-500">Delivered</button>
    </div>

    <div id="orders-list" class="space-y-6"></div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    let orders = [
      { id: "KM254789", status: "Shipped", product: "iPhone 13 Pro Max", price: 115000, date: "2 days ago", progress: 70 },
      { id: "KM254788", status: "Pending", product: "Nike Air Force 1", price: 6500, date: "5 days ago", progress: 20 },
      { id: "KM254787", status: "Delivered", product: "Sony Headphones", price: 22000, date: "12 days ago", progress: 100 }
    ];

    function renderOrders() {
      const container = document.getElementById('orders-list');
      container.innerHTML = orders.map(order => `
        <div onclick="viewOrder('${order.id}')" class="bg-white rounded-3xl p-6 shadow cursor-pointer hover:shadow-lg transition">
          <div class="flex justify-between items-start">
            <div>
              <p class="font-semibold">${order.product}</p>
              <p class="text-sm text-gray-500">Order #${order.id} • ${order.date}</p>
            </div>
            <span class="px-4 py-1 rounded-full text-sm font-medium ${order.status === 'Delivered' ? 'bg-green-100 text-green-700' : order.status === 'Shipped' ? 'bg-blue-100 text-blue-700' : 'bg-yellow-100 text-yellow-700'}">
              ${order.status}
            </span>
          </div>
          <div class="mt-4 flex justify-between items-center">
            <p class="font-bold">KSh ${order.price.toLocaleString()}</p>
            <button onclick="event.stopImmediatePropagation(); trackOrder('${order.id}')" class="text-blue-600 text-sm">Track Order →</button>
          </div>
        </div>
      `).join('');
    }

    function viewOrder(id) {
      alert(`Opening Order Details for #${id}\n\n(Full details page coming soon)`);
    }

    function trackOrder(id) {
      window.location.href = `order-tracking.html?id=${id}`;
    }

    function switchTab(n) {
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === n);
        btn.classList.toggle('border-b-2', i === n);
        btn.classList.toggle('border-blue-600', i === n);
      });
      // In real app, filter orders here
    }

    window.onload = renderOrders;
  </script>
</body>
</html>
