<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Kenya Market</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .product-card {
            border: 1px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .product-info {
            padding: 15px;
        }
        .product-info h3 {
            margin: 8px 0;
            color: #0a66c2;
        }
        .price {
            font-size: 18px;
            font-weight: bold;
            color: #28a745;
        }
    </style>
</head>
<body>
    <!-- Marquee -->
    <div class="marquee">
        <p>Free delivery on orders above KSh 2,000 • 50+ new products today • 24-hour customer support • Safe payment coming soon •</p>
    </div>

    <nav>
        <div class="logo">Kenya Market</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html" class="active">Products</a>
            <a href="#" onclick="showLogin()">I'm a Customer</a>
            <a href="#" onclick="showLogin()">I'm a Seller</a>
        </div>
    </nav>

    <div style="padding: 20px; max-width: 1200px; margin: 0 auto;">
        <input type="text" id="searchBar" placeholder="Search products (e.g. perfume, shirt, shoes)..." 
               style="width: 100%; padding: 15px; font-size: 18px; margin-bottom: 25px; border-radius: 8px; border: 1px solid #ddd;">

        <div id="productsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
            <!-- Products loaded by JavaScript -->
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const products = [
            { name: "Versace Eros Perfume", price: "KSh 4,500", img: "https://via.placeholder.com/300x200?text=Versace+Eros" },
            { name: "Nike Air Force 1", price: "KSh 6,200", img: "https://via.placeholder.com/300x200?text=Nike+AF1" },
            { name: "Samsung Galaxy A15", price: "KSh 18,900", img: "https://via.placeholder.com/300x200?text=Galaxy+A15" },
            { name: "Leather Jacket", price: "KSh 3,800", img: "https://via.placeholder.com/300x200?text=Leather+Jacket" },
            { name: "Wireless Headphones", price: "KSh 2,900", img: "https://via.placeholder.com/300x200?text=Headphones" }
        ];

        function displayProducts(filteredProducts) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            filteredProducts.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="\( {product.img}" alt=" \){product.name}">
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p class="price">${product.price}</p>
                        <button onclick="viewProduct('${product.name}')" style="margin-top:10px; padding:8px 16px; background:#0a66c2; color:white; border:none; border-radius:6px; cursor:pointer;">
                            View Details
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function viewProduct(productName) {
            showLogin();
        }

        // Search functionality
        document.addEventListener('DOMContentLoaded', () => {
            displayProducts(products);

            const searchBar = document.getElementById('searchBar');
            searchBar.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = products.filter(p => p.name.toLowerCase().includes(term));
                displayProducts(filtered);
            });
        });
    </script>
</body>
  </html>
