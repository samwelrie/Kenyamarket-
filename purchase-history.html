<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase History - KenyaMarket</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <button onclick="history.back()" class="text-2xl">←</button>
      <div class="font-bold text-xl">Purchase History</div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="space-y-6">
      <div class="bg-white rounded-3xl p-6">
        <p class="font-semibold">iPhone 13 Pro Max</p>
        <p class="text-sm text-gray-500">Order #KM254789 • Delivered on 15 May 2025</p>
        <p class="text-blue-600 font-bold mt-2">KSh 115,000</p>
      </div>
      <div class="bg-white rounded-3xl p-6">
        <p class="font-semibold">Nike Air Force 1</p>
        <p class="text-sm text-gray-500">Order #KM254788 • Delivered on 10 May 2025</p>
        <p class="text-blue-600 font-bold mt-2">KSh 6,500</p>
      </div>
    </div>
  </div>
</body>
</html>
