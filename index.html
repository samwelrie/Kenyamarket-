<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenya Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Marquee -->
    <div class="marquee">
        <p>Free delivery on orders above KSh 2,000 • 50+ new products today • 24-hour customer support • Over 500 happy customers • Safe payment coming soon •</p>
    </div>

    <!-- Navigation -->
    <nav>
        <div class="logo">Kenya Market</div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <div class="nav-links" id="navMenu">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="#" onclick="showLogin()">I'm a Customer</a>
            <a href="#" onclick="showLogin()">I'm a Seller</a>
            <a href="#" onclick="showLogin()">Login</a>
            <a href="#" onclick="showLogin()">Sign Up</a>
        </div>
    </nav>

    <!-- Hero -->
    <header>
        <h1>Welcome to Kenya Market</h1>
        <p>Best Deals in Kenya</p>
        <button onclick="goToProducts()" class="browse-btn">Browse All Products</button>
    </header>

    <!-- Featured Products -->
    <section class="featured">
        <h2>Featured Products</h2>
        <div class="products-grid" id="featuredGrid">
            <!-- Filled by JavaScript -->
        </div>
    </section>

    <script src="app.js"></script>
    <script>
        const featuredProducts = [
            { name: "Versace Eros", price: "KSh 4,200", img: "https://via.placeholder.com/300x250/8e44ad/fff?text=Versace" },
            { name: "Nike Air Force 1", price: "KSh 5,999", img: "https://via.placeholder.com/300x250/3498db/fff?text=Nike" },
            { name: "Samsung Galaxy A15", price: "KSh 17,500", img: "https://via.placeholder.com/300x250/2ecc71/fff?text=Samsung" },
            { name: "Wireless Headphones", price: "KSh 2,900", img: "https://via.placeholder.com/300x250/e74c3c/fff?text=Headphones" }
        ];

        function displayFeatured() {
            const grid = document.getElementById('featuredGrid');
            featuredProducts.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="\( {product.img}" alt=" \){product.name}">
                    <h3>${product.name}</h3>
                    <p class="price">${product.price}</p>
                    <button onclick="showLogin()" class="buy-btn">View Details</button>
                `;
                grid.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', displayFeatured);
    </script>
</body>
        </html>
