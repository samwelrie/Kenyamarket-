<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenya Market - Buy & Sell Locally</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .nav-links {
            display: flex;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 60px;
                left: 0;
                width: 100%;
                background: #0a66c2;
                padding: 20px;
            }
            .nav-links.active {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav style="background:#0a66c2; padding:15px; display:flex; justify-content:space-between; align-items:center; color:white;">
        <div class="logo" style="font-size:24px; font-weight:bold;">Kenya Market</div>
        
        <div id="navMenu" class="nav-links">
            <a href="index.html" style="color:white; text-decoration:none;">Home</a>
            <a href="products.html" style="color:white; text-decoration:none;">Products</a>
            <a href="seller-dashboard.html" style="color:white; text-decoration:none;">Sell</a>
        </div>

        <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:28px; cursor:pointer;">☰</button>
    </nav>

    <!-- Search Bar -->
    <div style="background:#0a66c2; padding:20px 0; text-align:center;">
        <input type="text" id="searchInput" placeholder="Search products..." 
               style="width:70%; max-width:700px; padding:15px; font-size:17px; border-radius:50px; border:none;">
    </div>

    <!-- Categories -->
    <div style="padding:20px; text-align:center; background:white;">
        <h2 style="margin-bottom:15px;">Shop by Category</h2>
        <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:15px;">
            <div class="category">📱 Phones & Accessories</div>
            <div class="category">👟 Fashion</div>
            <div class="category">🏠 Home & Kitchen</div>
            <div class="category">💻 Electronics</div>
            <div class="category">🛵 Motorbikes</div>
        </div>
    </div>

    <!-- Products -->
    <div style="max-width:1200px; margin:30px auto; padding:0 20px;">
        <h2 style="margin-bottom:20px;">Featured Products</h2>
        <div id="productsGrid" class="products-grid"></div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("navMenu");
            menu.classList.toggle("active");
        }

        const products = [
            { name: "Versace Eros Perfume", price: 4200, image: "https://picsum.photos/id/201/300/300" },
            { name: "Nike Air Force 1", price: 5999, image: "https://picsum.photos/id/60/300/300" },
            { name: "Samsung Galaxy A15", price: 17500, image: "https://picsum.photos/id/29/300/300" },
            { name: "Sony Wireless Headphones", price: 3800, image: "https://picsum.photos/id/180/300/300" }
        ];

        function displayProducts() {
            const container = document.getElementById("productsGrid");
            container.innerHTML = "";

            products.forEach(product => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML = `
                    <img src="\( {product.image}" alt=" \){product.name}">
                    <h3>${product.name}</h3>
                    <p class="price">KSh ${product.price.toLocaleString()}</p>
                `;
                container.appendChild(card);
            });
        }

        window.onload = displayProducts;
    </script>
</body>
</html>
