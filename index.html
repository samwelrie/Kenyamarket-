<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KenyaMarket - Buy & Sell Anything in Kenya</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .modal { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="bg-white">

  <!-- NAVBAR -->
  <nav class="bg-black text-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="text-2xl font-bold flex items-center gap-2">
        🇰🇪 KenyaMarket
      </a>
      
      <div class="flex-1 max-w-xl mx-6">
        <input type="text" id="global-search" 
               placeholder="Search products..." 
               class="w-full px-5 py-3 rounded-full bg-white text-black focus:outline-none">
      </div>

      <div class="flex items-center gap-6 text-sm">
        <a href="seller-dashboard.html" class="hover:text-orange-400 flex items-center gap-1">
          <i class="fas fa-plus"></i> Sell
        </a>
        <a href="customer-dashboard.html" class="hover:text-orange-400">👤</a>
        <button onclick="logout()" class="hover:text-orange-400">Logout</button>
      </div>
    </div>
  </nav>

  <!-- HERO + Other sections same as before... -->
  <!-- (Keeping your original hero, categories, etc.) -->

  <!-- Featured Listings with Modal Support -->
  <section class="bg-gray-50 py-12">
    <div class="max-w-7xl mx-auto px-4">
      <h2 class="text-2xl font-semibold mb-8">Featured Listings</h2>
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6" id="featured-grid">
        <!-- Products populated below -->
      </div>
    </div>
  </section>

  <!-- PRODUCT MODAL -->
  <div id="product-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
    <div class="bg-white rounded-3xl max-w-lg w-full mx-4 modal">
      <div class="relative">
        <img id="modal-image" src="" class="w-full h-80 object-cover rounded-t-3xl">
        <button onclick="closeModal()" 
                class="absolute top-4 right-4 bg-white text-black w-10 h-10 rounded-full flex items-center justify-center shadow-lg">✕</button>
      </div>
      <div class="p-6">
        <h2 id="modal-name" class="text-2xl font-bold"></h2>
        <p id="modal-price" class="text-3xl font-bold text-orange-600 mt-2"></p>
        <p id="modal-seller" class="text-gray-600 mt-4"></p>
        
        <div class="flex gap-3 mt-8">
          <button onclick="addToWishlist()" 
                  class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium">❤️ Add to Wishlist</button>
          <button onclick="contactSeller()" 
                  class="flex-1 py-4 bg-orange-500 text-white rounded-2xl font-medium">💬 Contact Seller</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Sample Products
    const products = [
      { id: 1, name: "iPhone 13 Pro Max", price: 115000, img: "https://picsum.photos/id/20/800/600", seller: "TechHub KE" },
      { id: 2, name: "Nike Air Force 1", price: 6500, img: "https://picsum.photos/id/201/800/600", seller: "UrbanWear" },
      { id: 3, name: "Sony WH-1000XM4", price: 22000, img: "https://picsum.photos/id/60/800/600", seller: "AudioStore" }
    ];

    function renderProducts() {
      const container = document.getElementById('featured-grid');
      container.innerHTML = products.map(p => `
        <div onclick="showProduct(${p.id})" class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl cursor-pointer transition">
          <img src="${p.img}" class="w-full h-40 object-cover">
          <div class="p-4">
            <p class="font-medium">${p.name}</p>
            <p class="text-orange-600 font-bold">KSh ${p.price.toLocaleString()}</p>
          </div>
        </div>
      `).join('');
    }

    let currentProduct = null;

    function showProduct(id) {
      currentProduct = products.find(p => p.id === id);
      if (!currentProduct) return;

      document.getElementById('modal-image').src = currentProduct.img;
      document.getElementById('modal-name').textContent = currentProduct.name;
      document.getElementById('modal-price').textContent = `KSh ${currentProduct.price.toLocaleString()}`;
      document.getElementById('modal-seller').textContent = currentProduct.seller;
      document.getElementById('product-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('product-modal').classList.add('hidden');
    }

    function addToWishlist() {
      alert("Added to Wishlist ❤️");
      closeModal();
    }

    function contactSeller() {
      alert("Message sent to seller! 🎉\n\nSeller will reply soon.");
      closeModal();
    }

    function logout() {
      localStorage.removeItem("currentUser");
      window.location.href = "login.html";
    }

    // Search
    document.getElementById('global-search').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        window.location.href = 'products.html';
      }
    });

    // Initialize
    window.onload = renderProducts;
  </script>
</body>
</html>
