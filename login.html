<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kenya Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <h2>Kenya Market</h2>
            <p>Sign in to continue</p>
            
            <input type="email" id="email" placeholder="Email address" value="seller@kenya.com">
            <input type="password" id="password" placeholder="Password" value="123456">
            
            <button class="btn login-btn" onclick="handleLogin()">Log in</button>
            <button class="btn signup-btn" onclick="goToSignup()">Create Account</button>
            
            <div class="divider">or continue with</div>
            <button class="btn google-btn">Continue with Google</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
