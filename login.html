<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - KenyaMarket</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-blue-600">🇰🇪 KenyaMarket</h1>
      <p class="text-gray-600 mt-3">Sign in to continue</p>
    </div>

    <form id="login-form" class="space-y-6">
      <input id="email" type="email" placeholder="Email" class="w-full p-5 border rounded-2xl" value="seller@kenya.com">
      <input id="password" type="password" placeholder="Password" class="w-full p-5 border rounded-2xl" value="123456">
      <button type="submit" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-semibold text-lg">Login</button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-8">
      Demo: seller@kenya.com / customer@kenya.com<br>Password: 123456
    </p>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      if (email.includes('seller')) {
        window.location.href = 'seller-dashboard.html';
      } else {
        window.location.href = 'customer-dashboard.html';
      }
    });
  </script>
</body>
</html>
