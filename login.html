<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - KenyaMarket</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-orange-600">🇰🇪 KenyaMarket</h1>
      <p class="text-gray-600 mt-2">Sign in to continue</p>
    </div>

    <form id="login-form" class="space-y-6">
      <div>
        <label class="block text-sm font-medium mb-2">Email</label>
        <input type="email" id="email" required
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-orange-500"
               placeholder="seller@kenya.com or customer@kenya.com">
      </div>

      <div>
        <label class="block text-sm font-medium mb-2">Password</label>
        <input type="password" id="password" required
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-orange-500"
               placeholder="123456">
      </div>

      <div class="flex items-center justify-between text-sm">
        <label><input type="checkbox" class="mr-2"> Remember me</label>
        <a href="#" class="text-orange-600 hover:underline">Forgot password?</a>
      </div>

      <button type="submit"
              class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-semibold text-lg">
        Login
      </button>
    </form>

    <div class="mt-6 text-center text-sm">
      <p>Don't have an account? 
        <a href="#" onclick="alert('Signup coming soon! Use demo accounts above.')" class="text-orange-600 hover:underline">Sign up</a>
      </p>
    </div>

    <div class="mt-8 text-xs text-gray-500 text-center">
      Demo Accounts:<br>
      <strong>Seller:</strong> seller@kenya.com / 123456<br>
      <strong>Buyer:</strong> customer@kenya.com / 123456
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/app.js"></script>
</body>
</html>
