<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kenya Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: linear-gradient(135deg, #0a66c2, #1e90ff); min-height: 100vh;">
    
    <div class="login-container">
        <h2>Kenya Market</h2>
        <input type="email" id="email" placeholder="Email address" required>
        <input type="password" id="password" placeholder="Password" required>
        
        <button class="btn login-btn" onclick="login()">Log in</button>
        <button class="btn signup-btn" onclick="signup()">Create account</button>
        
        <p style="margin-top: 25px; color: #666;">Or continue with</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
