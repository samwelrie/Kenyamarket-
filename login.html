<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kenya Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <h2>Kenya Market</h2>
            <p style="margin-bottom: 30px; color: #666;">Sign in to continue</p>
            
            <input type="email" id="email" placeholder="Email address" required>
            <input type="password" id="password" placeholder="Password" required>
            
            <button class="btn login-btn" onclick="login()">Log in</button>
            <button class="btn signup-btn" onclick="signup()">Create Account</button>
            
            <div class="divider">or</div>
            
            <button class="btn google-btn">Continue with Google</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
