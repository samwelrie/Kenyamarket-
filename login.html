<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - KenyaMarket</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-blue-600">🇰🇪 KenyaMarket</h1>
      <p class="text-gray-600 mt-3">Sign in to continue</p>
    </div>

    <form id="login-form" class="space-y-6">
      <input id="email" type="email" placeholder="Email Address" 
             class="w-full p-5 border rounded-2xl focus:outline-none focus:border-blue-500" value="seller@kenya.com">
      <input id="password" type="password" placeholder="Password" 
             class="w-full p-5 border rounded-2xl focus:outline-none focus:border-blue-500" value="123456">
      <button type="submit" 
              class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl font-semibold text-lg">
        Login
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-8">
      Demo Accounts:<br>
      Seller: seller@kenya.com<br>
      Buyer: customer@kenya.com<br>
      Password: 123456
    </p>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        alert("Please enter email and password");
        return;
      }

      await KenyaMarket.login(email, password);
    });
  </script>
</body>
</html>
