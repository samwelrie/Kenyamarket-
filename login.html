<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kenya Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <h2>Kenya Market</h2>
            <p>Sign in to continue</p>
            
            <input type="email" id="email" placeholder="Email address" value="seller@kenya.com">
            <input type="password" id="password" placeholder="Password" value="123456">
            
            <button class="btn login-btn" onclick="handleLogin()">Log in</button>
            
            <div style="margin-top:20px; text-align:center;">
                <small style="color:#666;">Demo Accounts:</small><br>
                <small>Seller: seller@kenya.com / 123456</small><br>
                <small>Customer: customer@kenya.com / 123456</small>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
