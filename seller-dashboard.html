<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - Kenya Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="logo">Kenya Market</div>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <div class="nav-links" id="navMenu">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="seller-dashboard.html" class="active">Seller Dashboard</a>
            <a href="#" onclick="logout()" style="background:#e74c3c; color:white; padding:8px 16px; border-radius:8px;">Logout</a>
        </div>
    </nav>

    <div style="max-width: 1100px; margin: 30px auto; padding: 0 20px;">
        <h1 style="margin-bottom: 8px;">Seller Dashboard</h1>
        <p id="welcomeText" style="font-size: 18px; color: #27ae60; margin-bottom: 30px;"></p>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 40px;">
            <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center;">
                <h2 id="totalProducts" style="margin:0; color:#0a66c2;">0</h2>
                <p style="margin:5px 0 0; color:#555;">Total Products</p>
            </div>
            <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center;">
                <h2 style="margin:0; color:#27ae60;">0</h2>
                <p style="margin:5px 0 0; color:#555;">Pending Orders</p>
            </div>
            <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center;">
                <h2 style="margin:0; color:#f39c12;">KSh 0</h2>
                <p style="margin:5px 0 0; color:#555;">Total Sales</p>
            </div>
        </div>

        <button onclick="showAddForm()" style="background:#27ae60; color:white; padding:14px 28px; border:none; border-radius:12px; font-size:17px; cursor:pointer; margin-bottom:30px;">
            + Add New Product
        </button>

        <div id="addForm" style="display:none; background:white; padding:25px; border-radius:12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom:40px;">
            <h2 style="margin-bottom:20px;">Add New Product</h2>
            <input type="text" id="productName" placeholder="Product Name" style="width:100%; padding:14px; margin-bottom:12px; border-radius:8px; border:1px solid #ddd;">
            <input type="text" id="productPrice" placeholder="Price (e.g. KSh 3,500)" style="width:100%; padding:14px; margin-bottom:12px; border-radius:8px; border:1px solid #ddd;">
            <textarea id="productDesc" placeholder="Description" style="width:100%; padding:14px; height:90px; border-radius:8px; border:1px solid #ddd;"></textarea>
            
            <div style="margin-top:20px;">
                <button onclick="addProduct()" style="background:#27ae60; color:white; padding:12px 25px; border:none; border-radius:8px; cursor:pointer;">Post Product</button>
                <button onclick="hideAddForm()" style="background:#95a5a6; color:white; padding:12px 25px; border:none; border-radius:8px; cursor:pointer; margin-left:12px;">Cancel</button>
            </div>
        </div>

        <h2 style="margin-bottom:20px;">My Products</h2>
        <div id="myProducts" class="products-grid"></div>
    </div>

    <script src="app.js"></script>
    <script>
        let myProducts = [];

        function loadDashboard() {
            const user = JSON.parse(localStorage.getItem("currentUser"));
            if (!user || user.role !== "seller") {
                window.location.href = "login.html";
                return;
            }

            document.getElementById("sellerName").textContent = user.name;
            document.getElementById("welcomeText").innerHTML = `Welcome back, <strong>${user.name}</strong>!`;

            myProducts = JSON.parse(localStorage.getItem("sellerProducts")) || [];
            document.getElementById("totalProducts").textContent = myProducts.length;
            displayProducts();
        }

        function showAddForm() {
            document.getElementById("addForm").style.display = "block";
        }

        function hideAddForm() {
            document.getElementById("addForm").style.display = "none";
        }

        function addProduct() {
            const name = document.getElementById("productName").value.trim();
            const price = document.getElementById("productPrice").value.trim();

            if (!name || !price) {
                alert("Please fill product name and price");
                return;
            }

            myProducts.unshift({
                name: name,
                price: price,
                description: document.getElementById("productDesc").value.trim() || "No description"
            });

            localStorage.setItem("sellerProducts", JSON.stringify(myProducts));
            hideAddForm();
            displayProducts();
            document.getElementById("totalProducts").textContent = myProducts.length;

            document.getElementById("productName").value = "";
            document.getElementById("productPrice").value = "";
            document.getElementById("productDesc").value = "";
        }

        function displayProducts() {
            const container = document.getElementById("myProducts");
            container.innerHTML = "";

            if (myProducts.length === 0) {
                container.innerHTML = "<p style='text-align:center;color:#777;padding:30px;'>No products yet. Add your first product above.</p>";
                return;
            }

            myProducts.forEach((product, index) => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML = `
                    <h3>${product.name}</h3>
                    <p class="price">${product.price}</p>
                    <small>${product.description}</small>
                    <button onclick="deleteProduct(${index})" style="margin-top:10px; background:#e74c3c; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer;">Delete</button>
                `;
                container.appendChild(card);
            });
        }

        function deleteProduct(index) {
            if (confirm("Delete this product?")) {
                myProducts.splice(index, 1);
                localStorage.setItem("sellerProducts", JSON.stringify(myProducts));
                displayProducts();
                document.getElementById("totalProducts").textContent = myProducts.length;
            }
        }

        window.onload = loadDashboard;
    </script>
</body>
    </html>
