<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - Kenya Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Kenya Market</div>
        <div style="display:flex; align-items:center; gap:15px;">
            <span id="sellerName" style="color:white; font-weight:500;"></span>
            <button onclick="logout()" style="background:#e74c3c; color:white; border:none; padding:10px 20px; border-radius:8px;">Logout</button>
        </div>
    </nav>

    <div style="max-width:1200px; margin:40px auto; padding:0 20px;">
        <h1>Seller Dashboard</h1>
        <p id="welcomeText" style="font-size:18px; color:#27ae60; margin-bottom:30px;"></p>

        <!-- Big Add Product Box -->
        <div onclick="showAddForm()" class="add-product-box">
            <div class="plus-sign">+</div>
            <p><strong>Add New Product</strong></p>
            <small>Click to upload product with image</small>
        </div>

        <!-- Add Product Form -->
        <div id="addForm" class="add-form">
            <h2>Add New Product</h2>
            
            <div class="image-upload-area" id="imageUploadArea" onclick="document.getElementById('imageInput').click()">
                <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="previewImage(event)">
                <div id="imagePreview"></div>
                <p>📸 Click to upload product image</p>
            </div>

            <input type="text" id="productName" placeholder="Product Name">
            <input type="text" id="productPrice" placeholder="Price (e.g. KSh 3,500)">
            <textarea id="productDesc" placeholder="Description"></textarea>
            
            <div class="form-buttons">
                <button onclick="addProduct()" class="post-btn">Post Product</button>
                <button onclick="hideAddForm()" class="cancel-btn">Cancel</button>
            </div>
        </div>

        <h2 style="margin:40px 0 20px;">My Products</h2>
        <div id="myProducts" class="products-grid"></div>
    </div>

    <script src="app.js"></script>
    <script>
        let myProducts = [];

        function loadDashboard() {
            const user = JSON.parse(localStorage.getItem("currentUser"));
            if (!user || user.role !== "seller") {
                window.location.href = "login.html";
                return;
            }

            document.getElementById("sellerName").textContent = user.name;
            document.getElementById("welcomeText").innerHTML = `Welcome back, <strong>${user.name}</strong>!`;

            myProducts = JSON.parse(localStorage.getItem("sellerProducts")) || [];
            displayProducts();
        }

        function showAddForm() {
            document.getElementById("addForm").style.display = "block";
            document.getElementById("imagePreview").innerHTML = "";
        }

        function hideAddForm() {
            document.getElementById("addForm").style.display = "none";
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById("imagePreview").innerHTML = 
                        `<img src="${e.target.result}" style="max-width:100%; max-height:180px; border-radius:8px;">`;
                };
                reader.readAsDataURL(file);
            }
        }

        function addProduct() {
            const name = document.getElementById("productName").value.trim();
            const price = document.getElementById("productPrice").value.trim();

            if (!name || !price) {
                alert("Product name and price are required");
                return;
            }

            myProducts.unshift({
                name: name,
                price: price,
                description: document.getElementById("productDesc").value.trim() || "No description"
            });

            localStorage.setItem("sellerProducts", JSON.stringify(myProducts));
            hideAddForm();
            displayProducts();

            // Clear form
            document.getElementById("productName").value = "";
            document.getElementById("productPrice").value = "";
            document.getElementById("productDesc").value = "";
            document.getElementById("imagePreview").innerHTML = "";
        }

        function displayProducts() {
            const container = document.getElementById("myProducts");
            container.innerHTML = "";

            if (myProducts.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#777; padding:40px;">No products added yet.</p>`;
                return;
            }

            myProducts.forEach((product, index) => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML = `
                    <h3>${product.name}</h3>
                    <p class="price">${product.price}</p>
                    <small>${product.description}</small>
                    <button onclick="deleteProduct(${index})" class="delete-btn">Delete</button>
                `;
                container.appendChild(card);
            });
        }

        function deleteProduct(index) {
            if (confirm("Delete this product?")) {
                myProducts.splice(index, 1);
                localStorage.setItem("sellerProducts", JSON.stringify(myProducts));
                displayProducts();
            }
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
