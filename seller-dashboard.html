<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - Kenya Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Kenya Market</div>
        <span id="sellerName" style="color:white; margin-left:auto; margin-right:15px;"></span>
        <button onclick="logout()" style="background:#e74c3c;">Logout</button>
    </nav>

    <div style="padding:20px; max-width:1100px; margin:0 auto;">
        <h1>Seller Dashboard</h1>
        <p id="welcomeText" style="color:#27ae60; font-size:18px;"></p>

        <div onclick="showAddForm()" style="border:3px dashed #0a66c2; border-radius:16px; padding:50px; text-align:center; margin:30px 0; cursor:pointer;">
            <div style="font-size:70px; color:#0a66c2;">+</div>
            <h2 style="color:#0a66c2;">Add New Product</h2>
        </div>

        <h2>My Products</h2>
        <div id="myProducts" class="products-grid"></div>
    </div>

    <!-- Add Product Form -->
    <div id="addForm" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:16px; width:90%; max-width:420px;">
            <h2>Add New Product</h2>
            <input type="text" id="productName" placeholder="Product Name" style="width:100%; padding:12px; margin:10px 0;">
            <input type="text" id="productPrice" placeholder="Price (KSh)" style="width:100%; padding:12px; margin:10px 0;">
            <textarea id="productDesc" placeholder="Description" style="width:100%; padding:12px; height:80px; margin:10px 0;"></textarea>
            
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button onclick="addProduct()" style="flex:1; background:#27ae60; color:white; padding:14px; border:none; border-radius:10px;">Post Product</button>
                <button onclick="hideAddForm()" style="flex:1; background:#95a5a6; color:white; padding:14px; border:none; border-radius:10px;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let myProducts = [];

        function showAddForm() {
            document.getElementById("addForm").style.display = "flex";
        }

        function hideAddForm() {
            document.getElementById("addForm").style.display = "none";
        }

        function addProduct() {
            const name = document.getElementById("productName").value.trim();
            const price = document.getElementById("productPrice").value.trim();

            if (!name || !price) return alert("Name and price required");

            const newProduct = {
                name: name,
                price: parseInt(price),
                description: document.getElementById("productDesc").value.trim() || "No description"
            };

            myProducts.unshift(newProduct);
            localStorage.setItem("marketProducts", JSON.stringify(myProducts));
            
            hideAddForm();
            displayProducts();
            
            // Clear form
            document.getElementById("productName").value = "";
            document.getElementById("productPrice").value = "";
            document.getElementById("productDesc").value = "";
        }

        function displayProducts() {
            const container = document.getElementById("myProducts");
            container.innerHTML = "";

            if (myProducts.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#777; padding:40px;">No products yet</p>`;
                return;
            }

            myProducts.forEach((product, index) => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML = `
                    <h3>${product.name}</h3>
                    <p class="price">KSh ${product.price.toLocaleString()}</p>
                    <button onclick="deleteProduct(${index})" style="background:#e74c3c; color:white; padding:8px 16px; border:none; border-radius:8px;">Delete</button>
                `;
                container.appendChild(card);
            });
        }

        function deleteProduct(index) {
            if (confirm("Delete this product?")) {
                myProducts.splice(index, 1);
                localStorage.setItem("marketProducts", JSON.stringify(myProducts));
                displayProducts();
            }
        }

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem("currentUser"));
            if (user) {
                document.getElementById("sellerName").textContent = user.name;
                document.getElementById("welcomeText").innerHTML = `Welcome back, <strong>${user.name}</strong>!`;
            }
            
            myProducts = JSON.parse(localStorage.getItem("marketProducts")) || [];
            displayProducts();
        };
    </script>
</body>
    </html>
