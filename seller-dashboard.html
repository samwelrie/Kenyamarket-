<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - Kenya Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Kenya Market</div>
        <div style="display:flex; align-items:center; gap:15px;">
            <span id="sellerName" style="color:white; font-weight:500;"></span>
            <button onclick="logout()" style="background:#e74c3c; color:white; border:none; padding:10px 20px; border-radius:8px;">Logout</button>
        </div>
    </nav>

    <div style="display:flex; max-width:1200px; margin:40px auto; padding:0 20px; gap:30px;">
        <!-- Sidebar -->
        <div style="width:220px; background:white; padding:20px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">
            <div onclick="switchTab(0)" style="padding:14px; margin:8px 0; border-radius:8px; background:#0a66c2; color:white; cursor:pointer;">📊 Dashboard</div>
            <div onclick="switchTab(1)" style="padding:14px; margin:8px 0; border-radius:8px; cursor:pointer;">📦 My Products</div>
            <div onclick="switchTab(2)" style="padding:14px; margin:8px 0; border-radius:8px; cursor:pointer;">📬 Orders</div>
        </div>

        <!-- Main Area -->
        <div style="flex:1;">
            <h1 id="pageTitle" style="margin-bottom:20px;">Dashboard</h1>

            <div id="tab0">
                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:20px; margin-bottom:40px;">
                    <div style="background:white; padding:25px; border-radius:12px; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.08);">
                        <h2 id="totalProducts" style="color:#0a66c2;">0</h2>
                        <p>Total Products</p>
                    </div>
                </div>

                <button onclick="showAddForm()" style="background:#27ae60; color:white; padding:16px 32px; font-size:18px; border:none; border-radius:12px; cursor:pointer;">
                    + Add New Product
                </button>
            </div>

            <div id="tab1" style="display:none;">
                <div id="myProducts" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); gap:20px;"></div>
            </div>
        </div>
    </div>

    <!-- Add Product Form -->
    <div id="addForm" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:16px; width:90%; max-width:420px;">
            <h2 style="margin-bottom:20px;">Add New Product</h2>
            <input type="text" id="productName" placeholder="Product Name" style="width:100%; padding:14px; margin:10px 0; border-radius:8px;">
            <input type="text" id="productPrice" placeholder="Price (e.g. KSh 4,200)" style="width:100%; padding:14px; margin:10px 0; border-radius:8px;">
            <textarea id="productDesc" placeholder="Description" style="width:100%; padding:14px; height:100px; margin:10px 0; border-radius:8px;"></textarea>
            
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button onclick="addProduct()" style="flex:1; background:#27ae60; color:white; padding:14px; border:none; border-radius:10px; font-size:16px;">Post Product</button>
                <button onclick="hideAddForm()" style="flex:1; background:#95a5a6; color:white; padding:14px; border:none; border-radius:10px; font-size:16px;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let myProducts = [];

        function switchTab(tab) {
            document.getElementById("tab0").style.display = tab === 0 ? "block" : "none";
            document.getElementById("tab1").style.display = tab === 1 ? "block" : "none";
            document.getElementById("pageTitle").textContent = tab === 0 ? "Dashboard" : "My Products";
        }

        function loadDashboard() {
            const user = JSON.parse(localStorage.getItem("currentUser"));
            if (!user || user.role !== "seller") return window.location.href = "login.html";

            document.getElementById("sellerName").textContent = user.name;
            myProducts = JSON.parse(localStorage.getItem("sellerProducts")) || [];
            document.getElementById("totalProducts").textContent = myProducts.length;
            displayProducts();
        }

        function showAddForm() {
            document.getElementById("addForm").style.display = "flex";
        }

        function hideAddForm() {
            document.getElementById("addForm").style.display = "none";
        }

        function addProduct() {
            const name = document.getElementById("productName").value.trim();
            const price = document.getElementById("productPrice").value.trim();
            if (!name || !price) return alert("Name and price required");

            myProducts.unshift({ name, price, description: document.getElementById("productDesc").value.trim() || "No description" });
            localStorage.setItem("sellerProducts", JSON.stringify(myProducts));
            
            hideAddForm();
            displayProducts();
            document.getElementById("totalProducts").textContent = myProducts.length;

            document.getElementById("productName").value = "";
            document.getElementById("productPrice").value = "";
            document.getElementById("productDesc").value = "";
        }

        function displayProducts() {
            const container = document.getElementById("myProducts");
            container.innerHTML = "";

            if (myProducts.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#777; padding:40px;'>No products yet.</p>";
                return;
            }

            myProducts.forEach((p, i) => {
                const div = document.createElement("div");
                div.className = "product-card";
                div.innerHTML = `<h3>\( {p.name}</h3><p class="price"> \){p.price}</p><small>${p.description}</small>
                    <button onclick="deleteProduct(${i})" style="margin-top:10px;background:#e74c3c;color:white;border:none;padding:8px 15px;border-radius:8px;">Delete</button>`;
                container.appendChild(div);
            });
        }

        function deleteProduct(i) {
            if (confirm("Delete?")) {
                myProducts.splice(i, 1);
                localStorage.setItem("sellerProducts", JSON.stringify(myProducts));
                displayProducts();
                document.getElementById("totalProducts").textContent = myProducts.length;
            }
        }

        window.onload = loadDashboard;
    </script>
</body>
    </html>
