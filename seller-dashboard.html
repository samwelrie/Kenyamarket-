<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Dashboard - KenyaMarket</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .modal { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="bg-gray-100">

  <!-- NAVBAR -->
  <nav class="bg-black text-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="text-2xl font-bold">🇰🇪 KenyaMarket</a>
      <div class="flex items-center gap-6">
        <a href="customer-dashboard.html" class="hover:text-orange-400">Buyer View</a>
        <button onclick="logout()" class="hover:text-orange-400">Logout</button>
      </div>
    </div>
  </nav>

  <div class="flex">
    <!-- Sidebar -->
    <div class="w-64 bg-white h-screen shadow p-6 hidden md:block">
      <div class="text-xl font-bold mb-8">Seller Dashboard</div>
      <div onclick="switchSection('dashboard')" class="menu-item active py-3 px-4 rounded-xl mb-1 cursor-pointer">📊 Dashboard</div>
      <div onclick="switchSection('products')" class="menu-item py-3 px-4 rounded-xl mb-1 cursor-pointer">📦 My Products</div>
      <div onclick="showAddProductModal()" class="menu-item py-3 px-4 rounded-xl mb-1 cursor-pointer bg-orange-500 text-white">➕ Add Product</div>
      <div onclick="switchSection('orders')" class="menu-item py-3 px-4 rounded-xl mb-1 cursor-pointer">📬 Orders & Messages</div>
      <div onclick="switchSection('analytics')" class="menu-item py-3 px-4 rounded-xl cursor-pointer">📈 Analytics</div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-6">
      <h1 class="text-3xl font-bold mb-2">Welcome back, John! 👋</h1>
      <p class="text-gray-600 mb-8">Here's what's happening with your store today.</p>

      <!-- Stats -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-white p-6 rounded-2xl shadow">Total Sales<br><span class="text-3xl font-bold">KSh 45,000</span></div>
        <div class="bg-white p-6 rounded-2xl shadow">Active Listings<br><span class="text-3xl font-bold">24</span></div>
        <div class="bg-white p-6 rounded-2xl shadow">Total Views<br><span class="text-3xl font-bold">5,340</span></div>
        <div class="bg-white p-6 rounded-2xl shadow">Messages<br><span class="text-3xl font-bold">12</span></div>
      </div>

      <!-- My Products Section -->
      <div id="products-section">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-semibold">Your Listings</h2>
          <button onclick="showAddProductModal()" class="bg-orange-500 text-white px-6 py-3 rounded-2xl flex items-center gap-2">
            <i class="fas fa-plus"></i> Add Product
          </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="listings-grid"></div>
      </div>
    </div>
  </div>

  <!-- ADD PRODUCT MODAL -->
  <div id="add-product-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
    <div class="bg-white rounded-3xl max-w-md w-full mx-4 modal p-8">
      <h2 class="text-2xl font-bold mb-6">Add New Product</h2>
      <input id="product-name" placeholder="Product Name" class="w-full p-4 border rounded-2xl mb-4">
      <input id="product-price" type="number" placeholder="Price in KSh" class="w-full p-4 border rounded-2xl mb-4">
      <textarea id="product-desc" placeholder="Description" class="w-full p-4 border rounded-2xl mb-6" rows="4"></textarea>
      
      <div class="flex gap-3">
        <button onclick="closeAddModal()" class="flex-1 py-4 border rounded-2xl">Cancel</button>
        <button onclick="postProduct()" class="flex-1 py-4 bg-orange-500 text-white rounded-2xl">Post Product</button>
      </div>
    </div>
  </div>

  <!-- PRODUCT DETAIL MODAL -->
  <div id="product-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]"></div>

  <script>
    let listings = [
      {id:1, name:"iPhone 13 Pro Max", price:115000, status:"Active", img:"https://picsum.photos/id/20/400/300"},
      {id:2, name:"Nike Air Force 1", price:6500, status:"Active", img:"https://picsum.photos/id/201/400/300"},
      {id:3, name:"Sony Headphones", price:22000, status:"Sold", img:"https://picsum.photos/id/60/400/300"}
    ];

    function renderListings() {
      const container = document.getElementById('listings-grid');
      container.innerHTML = listings.map(item => `
        <div class="bg-white rounded-2xl overflow-hidden shadow hover:shadow-xl transition cursor-pointer" onclick="viewProduct(${item.id})">
          <img src="${item.img}" class="w-full h-48 object-cover">
          <div class="p-4">
            <h3 class="font-semibold">${item.name}</h3>
            <p class="text-orange-600 font-bold">KSh ${item.price.toLocaleString()}</p>
            <p class="text-sm \( {item.status === 'Sold' ? 'text-red-500' : 'text-green-500'}"> \){item.status}</p>
            <button onclick="event.stopImmediatePropagation(); deleteProduct(${item.id});" class="mt-3 text-red-500 text-sm">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function showAddProductModal() {
      document.getElementById('add-product-modal').classList.remove('hidden');
    }

    function closeAddModal() {
      document.getElementById('add-product-modal').classList.add('hidden');
    }

    function postProduct() {
      const name = document.getElementById('product-name').value || "New Product";
      listings.unshift({
        id: Date.now(),
        name: name,
        price: parseInt(document.getElementById('product-price').value) || 10000,
        status: "Active",
        img: "https://picsum.photos/id/180/400/300"
      });
      renderListings();
      closeAddModal();
      alert("✅ Product posted successfully!");
    }

    function deleteProduct(id) {
      if (confirm("Delete this product?")) {
        listings = listings.filter(p => p.id !== id);
        renderListings();
      }
    }

    function viewProduct(id) {
      const product = listings.find(p => p.id === id);
      if (!product) return;

      const modal = document.getElementById('product-modal');
      modal.innerHTML = `
        <div class="bg-white rounded-3xl max-w-lg w-full mx-4 modal">
          <img src="${product.img}" class="w-full h-80 object-cover rounded-t-3xl">
          <div class="p-6">
            <h2 class="text-2xl font-bold">${product.name}</h2>
            <p class="text-3xl font-bold text-orange-600">KSh ${product.price.toLocaleString()}</p>
            <button onclick="closeProductModal()" class="mt-6 w-full py-4 bg-gray-200 rounded-2xl">Close</button>
          </div>
        </div>
      `;
      modal.classList.remove('hidden');
    }

    function closeProductModal() {
      document.getElementById('product-modal').classList.add('hidden');
    }

    function switchSection(section) {
      alert(`Switched to ${section} section`);
    }

    function logout() {
      localStorage.removeItem("currentUser");
      window.location.href = "login.html";
    }

    // Initialize
    window.onload = renderListings;
  </script>
</body>
</html>
