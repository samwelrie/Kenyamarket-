<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - Kenya Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top Navigation -->
    <nav>
        <div class="logo">Kenya Market</div>
        <div style="display:flex; align-items:center; gap:15px;">
            <span id="sellerName" style="color:white; font-weight:500;"></span>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="dashboard-main">
        <!-- Sidebar -->
        <div class="sidebar">
            <div onclick="switchTab(0)" class="sidebar-item active">📊 Dashboard</div>
            <div onclick="switchTab(1)" class="sidebar-item">📦 My Products</div>
            <div onclick="switchTab(2)" class="sidebar-item">📬 Orders</div>
            <div onclick="switchTab(3)" class="sidebar-item">📈 Analytics</div>
            <div onclick="switchTab(4)" class="sidebar-item">⚙️ Settings</div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <h1 id="pageTitle">Dashboard</h1>

            <div id="tab0">
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-icon">📦</span>
                        <h3 id="totalProducts">0</h3>
                        <p>Total Products</p>
                    </div>
                    <div class="stat-card">
                        <span class="stat-icon">📬</span>
                        <h3>3</h3>
                        <p>Pending Orders</p>
                    </div>
                    <div class="stat-card">
                        <span class="stat-icon">💰</span>
                        <h3>KSh 24,800</h3>
                        <p>This Month Sales</p>
                    </div>
                </div>

                <button onclick="showAddForm()" class="add-product-btn">
                    + Add New Product
                </button>
            </div>

            <div id="tab1" style="display:none;">
                <div id="myProducts" class="products-grid"></div>
            </div>

            <div id="tab2" style="display:none; padding:80px 20px; text-align:center; color:#666; font-size:18px;">
                Orders - Coming Soon
            </div>
            <div id="tab3" style="display:none; padding:80px 20px; text-align:center; color:#666; font-size:18px;">
                Analytics - Coming Soon
            </div>
            <div id="tab4" style="display:none; padding:80px 20px; text-align:center; color:#666; font-size:18px;">
                Settings - Coming Soon
            </div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div id="addForm" class="modal">
        <div class="modal-content">
            <h2>Add New Product</h2>
            <input type="text" id="productName" placeholder="Product Name">
            <input type="text" id="productPrice" placeholder="Price (e.g. KSh 3,500)">
            <textarea id="productDesc" placeholder="Description"></textarea>
            
            <div class="modal-buttons">
                <button onclick="addProduct()" class="post-btn">Post Product</button>
                <button onclick="hideAddForm()" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let myProducts = [];

        function switchTab(tab) {
            document.querySelectorAll('.main-content > div ').forEach(t => t.style.display = 'none');
            document.getElementById('tab' + tab).style.display = 'block';
            
            document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
            document.querySelectorAll('.sidebar-item') .classList.add('active');
            
            document.getElementById('pageTitle').textContent = ['Dashboard', 'My Products', 'Orders', 'Analytics', 'Settings'] ;
        }

        function loadDashboard() {
            const user = JSON.parse(localStorage.getItem("currentUser"));
            if (!user || user.role !== "seller") {
                window.location.href = "login.html";
                return;
            }

            document.getElementById("sellerName").textContent = user.name;
            myProducts = JSON.parse(localStorage.getItem("sellerProducts")) || [];
            document.getElementById("totalProducts").textContent = myProducts.length;
            displayProducts();
        }

        function showAddForm() {
            document.getElementById("addForm").style.display = "flex";
        }

        function hideAddForm() {
            document.getElementById("addForm").style.display = "none";
        }

        function addProduct() {
            const name = document.getElementById("productName").value.trim();
            const price = document.getElementById("productPrice").value.trim();

            if (!name || !price) {
                alert("Product name and price are required");
                return;
            }

            myProducts.unshift({
                name: name,
                price: price,
                description: document.getElementById("productDesc").value.trim() || "No description"
            });

            localStorage.setItem("sellerProducts", JSON.stringify(myProducts));
            hideAddForm();
            displayProducts();
            document.getElementById("totalProducts").textContent = myProducts.length;

            document.getElementById("productName").value = "";
            document.getElementById("productPrice").value = "";
            document.getElementById("productDesc").value = "";
        }

        function displayProducts() {
            const container = document.getElementById("myProducts");
            container.innerHTML = "";

            if (myProducts.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#777; padding:60px 20px;">No products yet.<br>Add your first product above.</p>`;
                return;
            }

            myProducts.forEach((product, index) => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML = `
                    <h3>${product.name}</h3>
                    <p class="price">${product.price}</p>
                    <small>${product.description}</small>
                    <button onclick="deleteProduct(${index})" class="delete-btn">Delete</button>
                `;
                container.appendChild(card);
            });
        }

        function deleteProduct(index) {
            if (confirm("Delete this product?")) {
                myProducts.splice(index, 1);
                localStorage.setItem("sellerProducts", JSON.stringify(myProducts));
                displayProducts();
                document.getElementById("totalProducts").textContent = myProducts.length;
            }
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
